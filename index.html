<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>컨설턴트 카카오톡 소통 평가</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --text: #1a1916;
    --text2: #6b6a65;
    --text3: #9e9d98;
    --green: #0f6e56;
    --green-bg: #e1f5ee;
    --amber: #854f0b;
    --amber-bg: #faeeda;
    --red: #a32d2d;
    --red-bg: #fcebeb;
    --blue: #185fa5;
    --blue-bg: #e6f1fb;
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  .wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  header {
    margin-bottom: 40px;
  }

  .header-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--text2);
    text-transform: uppercase;
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px;
    margin-bottom: 12px;
  }

  h1 {
    font-size: 26px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.02em;
    line-height: 1.3;
  }

  h1 span {
    color: var(--text2);
    font-weight: 400;
  }

  .section-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 10px;
  }

  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 22px;
    margin-bottom: 12px;
  }

  .info-grid {
    display: grid;
    grid-template-columns: 1fr 100px 110px;
    gap: 10px;
  }

  input, select {
    width: 100%;
    height: 38px;
    padding: 0 12px;
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    outline: none;
    transition: border-color 0.15s;
  }

  input:focus, select:focus {
    border-color: var(--text2);
  }

  input::placeholder { color: var(--text3); }

  .drop-zone {
    border: 1.5px dashed var(--border2);
    border-radius: var(--radius);
    padding: 32px 24px;
    text-align: center;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    user-select: none;
  }

  .drop-zone:hover, .drop-zone.over {
    background: var(--surface2);
    border-color: var(--text2);
  }

  .drop-icon {
    width: 36px;
    height: 36px;
    margin: 0 auto 10px;
    background: var(--surface2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .drop-zone strong {
    display: block;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 4px;
  }

  .drop-zone p {
    font-size: 13px;
    color: var(--text2);
  }

  .file-list {
    margin-top: 12px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .file-chip {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 12px;
    background: var(--surface2);
    border-radius: var(--radius-sm);
    font-size: 13px;
  }

  .file-chip span { color: var(--text); }

  .file-chip button {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text3);
    font-size: 17px;
    line-height: 1;
    padding: 0 2px;
    transition: color 0.1s;
  }

  .file-chip button:hover { color: var(--red); }

  .run-btn {
    width: 100%;
    height: 42px;
    margin-top: 16px;
    font-size: 14px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    background: var(--text);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    transition: opacity 0.15s;
    letter-spacing: -0.01em;
  }

  .run-btn:hover { opacity: 0.85; }
  .run-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .progress-wrap {
    margin-top: 14px;
    display: none;
  }

  .progress-track {
    background: var(--surface2);
    border-radius: 4px;
    height: 3px;
    overflow: hidden;
  }

  .progress-fill {
    height: 3px;
    background: var(--green);
    border-radius: 4px;
    width: 0%;
    transition: width 0.4s ease;
  }

  .status-text {
    font-size: 12px;
    color: var(--text2);
    margin-top: 7px;
    min-height: 18px;
  }

  .error-text {
    font-size: 13px;
    color: var(--red);
    margin-top: 6px;
  }

  .results-section { margin-top: 36px; }

  .student-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 22px;
    margin-bottom: 10px;
  }

  .student-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .student-name {
    font-size: 14px;
    font-weight: 500;
  }

  .avg-badge {
    font-size: 12px;
    padding: 2px 10px;
    border-radius: 20px;
    font-weight: 500;
  }

  .avg-상 { background: var(--green-bg); color: var(--green); }
  .avg-중 { background: var(--amber-bg); color: var(--amber); }
  .avg-하 { background: var(--red-bg); color: var(--red); }

  .eval-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .eval-item {
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
  }

  .eval-label {
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 4px;
    letter-spacing: 0.02em;
  }

  .eval-grade {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 3px;
  }

  .grade-상 { color: var(--green); }
  .grade-중 { color: var(--amber); }
  .grade-하 { color: var(--red); }

  .eval-reason {
    font-size: 11px;
    color: var(--text2);
    line-height: 1.55;
  }

  .summary-card {
    background: var(--text);
    border-radius: var(--radius);
    padding: 24px;
    margin-top: 20px;
    color: #fff;
  }

  .summary-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .summary-header h2 {
    font-size: 16px;
    font-weight: 500;
    color: rgba(255,255,255,0.7);
  }

  .grade-pill {
    font-size: 13px;
    font-weight: 600;
    padding: 3px 14px;
    border-radius: 20px;
    background: rgba(255,255,255,0.15);
    color: #fff;
    letter-spacing: 0.02em;
  }

  .summary-metrics {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }

  .s-metric {
    background: rgba(255,255,255,0.07);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
  }

  .s-metric .label {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 4px;
  }

  .s-metric .value {
    font-size: 18px;
    font-weight: 600;
    color: #fff;
  }

  .area-scores {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 20px;
  }

  .area-score-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(255,255,255,0.07);
    border-radius: var(--radius-sm);
    padding: 9px 12px;
  }

  .area-score-item .a-label {
    font-size: 12px;
    color: rgba(255,255,255,0.6);
  }

  .area-score-item .a-val {
    font-size: 13px;
    font-weight: 500;
    color: #fff;
  }

  .action-row {
    display: flex;
    gap: 8px;
  }

  .action-btn {
    flex: 1;
    height: 36px;
    font-size: 13px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    border-radius: var(--radius-sm);
    transition: opacity 0.15s;
  }

  .btn-copy {
    background: rgba(255,255,255,0.12);
    color: #fff;
    border: 0.5px solid rgba(255,255,255,0.2);
  }

  .btn-copy:hover { opacity: 0.8; }

  .btn-sheet {
    background: #1D9E75;
    color: #fff;
    border: none;
  }

  .btn-sheet:hover { opacity: 0.85; }

  @media (max-width: 560px) {
    .info-grid { grid-template-columns: 1fr 1fr; }
    .info-grid input:first-child { grid-column: 1 / -1; }
    .eval-grid { grid-template-columns: 1fr; }
    .summary-metrics { grid-template-columns: 1fr 1fr; }
    .area-scores { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="header-badge">유니브클래스 · 내부 운영 도구</div>
    <h1>컨설턴트 카카오톡 소통 평가 <span>월별 자동 분석</span></h1>
  </header>

  <p class="section-label">컨설턴트 정보</p>
  <div class="card">
    <div class="info-grid">
      <input id="consultant-name" type="text" placeholder="컨설턴트 이름" />
      <select id="eval-month"></select>
      <input id="student-count" type="number" placeholder="담당 학생 수" min="1" max="30" />
    </div>
  </div>

  <p class="section-label" style="margin-top:20px">카카오톡 대화로그 업로드</p>
  <div class="card">
    <div class="drop-zone" id="drop-zone">
      <div class="drop-icon">📂</div>
      <strong>파일을 드래그하거나 클릭해서 선택</strong>
      <p>학생별 .txt 파일 여러 개 동시 선택 가능</p>
      <input type="file" id="file-input" accept=".txt" multiple style="display:none" />
    </div>
    <div class="file-list" id="file-list"></div>
    <button class="run-btn" id="run-btn" disabled>AI 평가 시작</button>
    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      <p class="status-text" id="status-text"></p>
    </div>
    <p class="error-text" id="error-text"></p>
  </div>

  <div class="results-section" id="results-section" style="display:none">
    <p class="section-label">학생별 평가 결과</p>
    <div id="student-results"></div>
    <div class="summary-card" id="summary-card" style="display:none">
      <div class="summary-header">
        <h2 id="summary-title">종합 평가</h2>
        <span class="grade-pill" id="grade-pill"></span>
      </div>
      <div class="summary-metrics">
        <div class="s-metric"><p class="label">카카오톡 파트 인센티브</p><p class="value" id="s-incentive"></p></div>
        <div class="s-metric"><p class="label">종합 등급</p><p class="value" id="s-grade"></p></div>
        <div class="s-metric"><p class="label">분석 학생 수</p><p class="value" id="s-count"></p></div>
        <div class="s-metric"><p class="label">평균 점수</p><p class="value" id="s-score"></p></div>
      </div>
      <div class="area-scores" id="area-scores"></div>
      <div class="action-row">
        <button class="action-btn btn-copy" id="copy-btn">결과 텍스트 복사</button>
        <button class="action-btn btn-sheet" id="sheet-btn">구글 시트로 내보내기</button>
      </div>
    </div>
  </div>
</div>

<script>
const AREAS = [
  { key: '응답속도정확성', label: '응답속도·정확성' },
  { key: '주도적안내격려', label: '주도적 안내·격려' },
  { key: '피드백구체성',   label: '피드백 구체성' },
  { key: '정서적지지동기', label: '정서적 지지·동기' },
];

const gradeScore = { '상': 3, '중': 2, '하': 1 };

function scoreToLetter(avg) {
  if (avg >= 2.8) return 'A';
  if (avg >= 2.2) return 'B';
  if (avg >= 1.6) return 'C';
  return 'D';
}

function letterToPoints(l) {
  return { A: 4, B: 3, C: 2, D: 1 }[l] || 1;
}

function avgGrade(scores) {
  const avg = scores.reduce((s, v) => s + v, 0) / scores.length;
  if (avg >= 2.5) return '상';
  if (avg >= 1.5) return '중';
  return '하';
}

// month select
const monthSel = document.getElementById('eval-month');
for (let i = 1; i <= 12; i++) {
  const o = document.createElement('option');
  o.value = i;
  o.textContent = `${i}월`;
  monthSel.appendChild(o);
}
monthSel.value = new Date().getMonth() + 1;

// file handling
let files = [];
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const fileList = document.getElementById('file-list');
const runBtn = document.getElementById('run-btn');
const progressWrap = document.getElementById('progress-wrap');
const progressFill = document.getElementById('progress-fill');
const statusText = document.getElementById('status-text');
const errorText = document.getElementById('error-text');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('over'); addFiles([...e.dataTransfer.files]); });
fileInput.addEventListener('change', () => addFiles([...fileInput.files]));

function addFiles(newFiles) {
  newFiles.forEach(f => {
    if (f.name.endsWith('.txt') && !files.find(x => x.name === f.name)) files.push(f);
  });
  renderFiles();
}

function removeFile(i) { files.splice(i, 1); renderFiles(); }

function renderFiles() {
  fileList.innerHTML = files.map((f, i) =>
    `<div class="file-chip"><span>${f.name}</span><button onclick="removeFile(${i})">×</button></div>`
  ).join('');
  runBtn.disabled = files.length === 0;
}

// analysis
let results = [];

async function analyzeFile(file) {
  const text = await file.text();
const studentName = file.name.replace(/\.txt$/, '').split('_')[0];
  const res = await fetch('/api/evaluate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ logText: text, studentName }),
  });

  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.error || '서버 오류');
  }
  return { studentName, eval: await res.json() };
}

runBtn.addEventListener('click', async () => {
  const name = document.getElementById('consultant-name').value.trim();
  const month = monthSel.value;
  const count = parseInt(document.getElementById('student-count').value) || files.length;

  if (!name) { errorText.textContent = '컨설턴트 이름을 입력해주세요.'; return; }
  errorText.textContent = '';
  results = [];

  document.getElementById('student-results').innerHTML = '';
  document.getElementById('results-section').style.display = 'block';
  document.getElementById('summary-card').style.display = 'none';
  progressWrap.style.display = 'block';
  progressFill.style.width = '0%';
  runBtn.disabled = true;

  for (let i = 0; i < files.length; i++) {
    const f = files[i];
    statusText.textContent = `분석 중 (${i + 1}/${files.length}): ${f.name.replace('.txt', '')}`;
    progressFill.style.width = `${Math.round((i / files.length) * 100)}%`;

    try {
      const result = await analyzeFile(f);
      results.push(result);
      renderStudentCard(result);
    } catch (e) {
      errorText.textContent = `${f.name} 분석 실패: ${e.message}`;
    }
  }

  progressFill.style.width = '100%';
  statusText.textContent = `완료 (${results.length}명 분석됨)`;
  renderSummary(name, month, count);
  runBtn.disabled = false;
});

function renderStudentCard({ studentName, eval: ev }) {
  const scores = AREAS.map(a => gradeScore[ev[a.key]?.등급] || 2);
  const ag = avgGrade(scores);

  const html = `
    <div class="student-card">
      <div class="student-header">
        <p class="student-name">${studentName}</p>
        <span class="avg-badge avg-${ag}">평균 ${ag}</span>
      </div>
      <div class="eval-grid">
        ${AREAS.map(a => `
          <div class="eval-item">
            <p class="eval-label">${a.label}</p>
            <p class="eval-grade grade-${ev[a.key]?.등급}">${ev[a.key]?.등급 || '-'}</p>
            <p class="eval-reason">${ev[a.key]?.이유 || ''}</p>
          </div>`).join('')}
      </div>
    </div>`;

  document.getElementById('student-results').insertAdjacentHTML('beforeend', html);
}

function renderSummary(name, month, count) {
  const areaAvgs = AREAS.map(a => {
    const scores = results.map(r => gradeScore[r.eval[a.key]?.등급] || 2);
    return scores.reduce((s, v) => s + v, 0) / scores.length;
  });
  const overallAvg = areaAvgs.reduce((s, v) => s + v, 0) / 4;
  const letter = scoreToLetter(overallAvg);
  const points = letterToPoints(letter);
  const incentive = Math.round(count * 100000 * (points / 4) * 0.5);

  document.getElementById('summary-title').textContent = `${name} · ${month}월`;
  document.getElementById('grade-pill').textContent = `${letter}등급`;
  document.getElementById('s-incentive').textContent = `₩${incentive.toLocaleString()}`;
  document.getElementById('s-grade').textContent = `${letter}등급`;
  document.getElementById('s-count').textContent = `${results.length}명`;
  document.getElementById('s-score').textContent = overallAvg.toFixed(2);

  document.getElementById('area-scores').innerHTML = AREAS.map((a, i) => `
    <div class="area-score-item">
      <span class="a-label">${a.label}</span>
      <span class="a-val">${['상','중','하'][areaAvgs[i] >= 2.5 ? 0 : areaAvgs[i] >= 1.5 ? 1 : 2]} (${areaAvgs[i].toFixed(2)})</span>
    </div>`).join('');

  document.getElementById('summary-card').style.display = 'block';

  const SHEET_URL = 'https://script.google.com/macros/s/AKfycbwa2sYhuvXhCDEaJ6j0_jLaIUpay6A5kkOC-3Ffccw92cjPQm6_Jn2uYlGx7DljgTdKaQ/exec';

  document.getElementById('sheet-btn').onclick = async () => {
    const btn = document.getElementById('sheet-btn');
    btn.textContent = '전송 중...';
    btn.disabled = true;

    const payload = results.map(r => ({
      name: r.studentName,
      응답속도정확성: r.eval.응답속도정확성?.등급 || '',
      주도적안내격려: r.eval.주도적안내격려?.등급 || '',
      피드백구체성: r.eval.피드백구체성?.등급 || '',
      정서적지지동기: r.eval.정서적지지동기?.등급 || '',
    }));

    try {
      await fetch(SHEET_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      btn.textContent = '전송 완료!';
      setTimeout(() => { btn.textContent = '구글 시트로 내보내기'; btn.disabled = false; }, 2000);
    } catch(e) {
      btn.textContent = '전송 실패';
      btn.disabled = false;
    }
  };

  document.getElementById('copy-btn').onclick = () => {
    const lines = [`[카카오톡 소통 평가] ${name} · ${month}월\n`];
    results.forEach(r => {
      lines.push(`▶ ${r.studentName}`);
      AREAS.forEach(a => {
        lines.push(`  ${a.label}: ${r.eval[a.key]?.등급} — ${r.eval[a.key]?.이유}`);
      });
      lines.push('');
    });
    lines.push(`종합 등급: ${letter}등급 (평균 ${overallAvg.toFixed(2)}점)`);
    lines.push(`카카오톡 파트 인센티브: ₩${incentive.toLocaleString()} (담당 ${count}명 기준)`);
    navigator.clipboard.writeText(lines.join('\n')).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = '복사 완료!';
      setTimeout(() => { btn.textContent = '결과 텍스트 복사'; }, 2000);
    });
  };
}
</script>
</body>
</html>
